name: .NET

on:
  push:
    tags:
    - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x
    - name: Set Version Variable
      if: ${{ github.ref_type == 'tag' }}
      env:
        TAG: ${{ github.ref_name }}
      run: echo "VERSION=${TAG#v}" >> $GITHUB_ENV
    - name: Build for Windows
      run: dotnet publish --runtime win-x64 -p:PublishSingleFile=true -p:SelfContained=false -p:Version=$VERSION -p:AssemblyVersion=$VERSION
    - name: Create Windows artifact
      run: |
        zip -j UnrealAssestScout-${{ github.ref_name }}.zip ./UnrealAssestScout/bin/Release/net8.0/win-x64/publish/*
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          UnrealAssestScout-${{ github.ref_name }}.zip


